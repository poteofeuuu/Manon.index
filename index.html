<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Exam - Manon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <!-- MENU PRINCIPAL -->
    <div id="menu" class="screen active">
        <h1>Salut Manon ! 🌸</h1>
        <p>Petite pause méritée. Choisis ton mode :</p>
        <div class="menu-grid">
            <div class="card" onclick="showGame('game-memory')">🧠<br>Memory Souvenirs</div>
            <div class="card" onclick="showGame('game-catch')">🎯<br>Explose le Stress</div>
            <div class="card" onclick="showGame('game-slots')">🎰<br>Machine à KDO</div>
        </div>
    </div>

    <!-- JEU 1: MEMORY -->
    <div id="game-memory" class="screen">
        <button class="back-btn" onclick="showMenu()">← Menu</button>
        <h2>Memory des Moments</h2>
        <div class="memory-grid" id="memory-board"></div>
        <p id="memory-msg"></p>
    </div>

    <!-- JEU 2: CATCH -->
    <div id="game-catch" class="screen">
        <button class="back-btn" onclick="showMenu()">← Menu</button>
        <h2>Explose les trucs chiants !</h2>
        <p>Score: <span id="score">0</span></p>
        <div id="catch-area"></div>
    </div>

    <!-- JEU 3: SLOTS -->
    <div id="game-slots" class="screen">
        <button class="back-btn" onclick="showMenu()">← Menu</button>
        <h2>La Machine à Motivation</h2>
        <div class="slots">
            <div class="slot" id="s1">?</div>
            <div class="slot" id="s2">?</div>
            <div class="slot" id="s3">?</div>
        </div>
        <button class="play-btn" onclick="spin()">Tirer le levier !</button>
        <h3 id="slot-result"></h3>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
