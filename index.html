<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Aventures de Manon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <header>
            <h1>Manon vs. La Vie Actuelle</h1>
            <div id="score-board">Jours survécus : <span id="score">0</span></div>
        </header>

        <div id="game-area">
            <div id="manon">👩🏻‍💻</div>
            </div>

        <div id="overlay">
            <div id="message-box">
                <h2>Game Over !</h2>
                <p id="death-message">La réalité t'a rattrapée...</p>
                <button onclick="resetGame()">Retenter l'esquive</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
